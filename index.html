<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fast Food</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
.header{background:#ff3d00;color:white;padding:20px;border-bottom-left-radius:20px;border-bottom-right-radius:20px}
.container{padding:15px}
.card{background:white;border-radius:15px;padding:15px;margin-bottom:15px;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
button{width:100%;padding:12px;border:none;border-radius:10px;background:#ff3d00;color:white;margin-top:10px}
input{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #ddd}
</style>
</head>

<body>

<div class="header">
<h2>🍔 Fast Food</h2>
<p id="user"></p>
</div>

<div class="container">

<div class="card">
<h3>Burger - 30000 so'm</h3>
<input type="number" id="burger" placeholder="Miqdor">
</div>

<div class="card">
<h3>Lavash - 25000 so'm</h3>
<input type="number" id="lavash" placeholder="Miqdor">
</div>

<div class="card">
<h3>Cola - 8000 so'm</h3>
<input type="number" id="cola" placeholder="Miqdor">
</div>

<div class="card">
<h3>Ma'lumot</h3>
<input type="text" id="name" placeholder="Ismingiz">
<input type="tel" id="phone" placeholder="Telefon raqam">
<button onclick="sendOrder()">Buyurtma berish</button>
</div>

</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

let user = tg.initDataUnsafe.user;
document.getElementById("user").innerText = user.first_name;

function sendOrder(){

let burger = document.getElementById("burger").value || 0;
let lavash = document.getElementById("lavash").value || 0;
let cola = document.getElementById("cola").value || 0;
let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;

if(!name || !phone){
alert("Ism va telefon kiriting");
return;
}

let total = burger*30000 + lavash*25000 + cola*8000;

if(total == 0){
alert("Mahsulot tanlang");
return;
}

let data = {
name:name,
phone:phone,
burger:burger,
lavash:lavash,
cola:cola,
total:total
};

tg.sendData(JSON.stringify(data));
}
</script>

</body>
</html>
